<!DOCTYPE html>
<!--
============================================================================
  Vroom-Jago 決策模式專家系統 (Vroom-Jago Decision-Making Expert System)
============================================================================
  模型來源:
    Vroom, V. H., & Jago, A. G. (1988). The new leadership: Managing
      participation in organizations. Englewood Cliffs, NJ: Prentice-Hall.
  原始模型:
    Vroom, V. H., & Yetton, P. W. (1973). Leadership and decision-making.
      Pittsburgh, PA: University of Pittsburgh Press.
  
  本系統實作多項問題屬性診斷,計算五種決策過程的整體效能 (O_Eff),
  並依據規範模型推薦最適決策方式。
  
  單檔 HTML/CSS/JS,離線可用,不依賴任何外部資源。
============================================================================
-->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vroom-Jago 決策模式專家系統</title>
<style>
/* ============================================================
   設計系統 — 學術期刊風格
   主色:深藍 #1e3a5f / 米白 #f8f5f0 / 強調金 #c9a961
   ============================================================ */
:root {
  --navy:       #1e3a5f;
  --navy-deep:  #14283f;
  --navy-soft:  #2d5078;
  --cream:      #f8f5f0;
  --cream-warm: #f1ece2;
  --gold:       #c9a961;
  --gold-deep:  #a88a44;
  --ink:        #1a1a1a;
  --ink-soft:   #4a4a4a;
  --ink-mute:   #7a7a7a;
  --line:       #d8d2c4;
  --line-soft:  #e8e2d4;
  --paper:      #fdfbf7;
  --shadow-sm:  0 1px 2px rgba(20,40,63,.06), 0 2px 8px rgba(20,40,63,.04);
  --shadow-md:  0 4px 12px rgba(20,40,63,.08), 0 12px 32px rgba(20,40,63,.06);
  --shadow-lg:  0 12px 32px rgba(20,40,63,.12), 0 32px 64px rgba(20,40,63,.08);
  --serif:      "Source Serif Pro", "Noto Serif TC", "Songti TC", "STSong",
                "PingFang TC", Georgia, "Times New Roman", serif;
  --sans:       -apple-system, BlinkMacSystemFont, "PingFang TC",
                "Microsoft JhengHei", "Heiti TC", "Helvetica Neue",
                Arial, sans-serif;
  --mono:       "SF Mono", "JetBrains Mono", "Menlo", "Consolas", monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--cream);
  color: var(--ink);
  line-height: 1.65;
  font-size: 16px;
  letter-spacing: 0.01em;
  min-height: 100vh;
  /* 紙質紋理 */
  background-image:
    radial-gradient(circle at 25% 15%, rgba(201,169,97,0.04) 0%, transparent 50%),
    radial-gradient(circle at 75% 85%, rgba(30,58,95,0.03) 0%, transparent 55%);
}

/* 學術頁眉 */
.app-header {
  background: linear-gradient(180deg, var(--navy-deep) 0%, var(--navy) 100%);
  color: var(--cream);
  padding: 18px 0;
  position: sticky; top: 0; z-index: 100;
  border-bottom: 3px solid var(--gold);
  box-shadow: var(--shadow-md);
}
.app-header-inner {
  max-width: 1100px; margin: 0 auto;
  padding: 0 28px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
}
.header-brand { display: flex; align-items: center; gap: 14px; }
.header-mark {
  width: 38px; height: 38px;
  border: 1.5px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-style: italic;
  font-size: 20px; font-weight: 600; color: var(--gold);
  letter-spacing: 0;
}
.header-title { font-family: var(--serif); font-size: 18px; font-weight: 600; letter-spacing: 0.02em; }
.header-sub   { font-size: 11px; color: rgba(248,245,240,0.65); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 2px; }
.header-step  {
  font-family: var(--mono); font-size: 11px;
  color: var(--gold); letter-spacing: 0.18em; text-transform: uppercase;
  border-left: 1px solid rgba(201,169,97,0.4);
  padding-left: 16px;
}

/* 主容器 */
main { max-width: 980px; margin: 0 auto; padding: 56px 28px 96px; }

/* ============================================================
   STEP 0 — 歡迎頁
   ============================================================ */
.welcome { animation: fadeUp 0.6s ease-out; }
.welcome-eyebrow {
  font-family: var(--mono); font-size: 11px;
  color: var(--gold-deep); letter-spacing: 0.3em; text-transform: uppercase;
  margin-bottom: 18px;
  display: flex; align-items: center; gap: 14px;
}
.welcome-eyebrow::before, .welcome-eyebrow::after {
  content: ''; height: 1px; background: var(--gold-deep); flex: 0 0 32px;
}
.welcome-eyebrow::after { flex: 1; opacity: 0.4; }
.welcome-title {
  font-family: var(--serif);
  font-size: clamp(36px, 5vw, 56px);
  font-weight: 700;
  color: var(--navy-deep);
  line-height: 1.1;
  letter-spacing: -0.02em;
  margin-bottom: 16px;
}
.welcome-title em {
  font-style: italic;
  color: var(--gold-deep);
  font-weight: 500;
}
.welcome-title-en {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(18px, 2.2vw, 24px);
  color: var(--ink-soft);
  font-weight: 400;
  margin-bottom: 32px;
  letter-spacing: 0.01em;
}
.welcome-cite {
  font-family: var(--serif);
  font-size: 14px; color: var(--ink-mute);
  font-style: italic;
  border-left: 2px solid var(--gold);
  padding: 6px 16px;
  margin-bottom: 36px;
  line-height: 1.55;
}
.welcome-intro {
  font-size: 17px; line-height: 1.85;
  color: var(--ink-soft);
  max-width: 720px;
  margin-bottom: 48px;
}
.welcome-intro strong { color: var(--navy); font-weight: 600; }

.problem-choose-label {
  font-family: var(--mono); font-size: 11px;
  color: var(--ink-mute); letter-spacing: 0.25em; text-transform: uppercase;
  margin-bottom: 18px;
}
.problem-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  margin-bottom: 56px;
}
.problem-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 2px;
  padding: 32px 28px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  text-align: left;
  font-family: inherit;
  position: relative;
  overflow: hidden;
}
.problem-card::before {
  content: '';
  position: absolute; left: 0; top: 0;
  width: 4px; height: 100%;
  background: var(--gold);
  transform: scaleY(0); transform-origin: top;
  transition: transform 0.4s ease;
}
.problem-card:hover::before { transform: scaleY(1); }
.problem-card:hover {
  border-color: var(--navy);
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
}
.problem-card-num {
  font-family: var(--serif); font-style: italic;
  font-size: 13px; color: var(--gold-deep);
  letter-spacing: 0.05em;
  margin-bottom: 10px;
}
.problem-card-title {
  font-family: var(--serif);
  font-size: 24px; font-weight: 600;
  color: var(--navy-deep);
  margin-bottom: 4px;
}
.problem-card-en {
  font-family: var(--serif); font-style: italic;
  font-size: 14px; color: var(--ink-mute);
  margin-bottom: 14px;
}
.problem-card-desc {
  font-size: 14px; color: var(--ink-soft);
  line-height: 1.7;
}
.problem-card-arrow {
  margin-top: 16px;
  font-family: var(--serif); font-size: 13px;
  color: var(--gold-deep); font-style: italic;
  display: flex; align-items: center; gap: 6px;
}

/* 摺疊區塊 */
details.disclosure {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 2px;
  margin-bottom: 16px;
  overflow: hidden;
  transition: all 0.3s ease;
}
details.disclosure[open] {
  border-color: var(--gold);
  box-shadow: var(--shadow-sm);
}
details.disclosure summary {
  padding: 18px 24px;
  cursor: pointer;
  font-family: var(--serif);
  font-size: 16px; font-weight: 600;
  color: var(--navy);
  list-style: none;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.2s ease;
}
details.disclosure summary::-webkit-details-marker { display: none; }
details.disclosure summary:hover { background: var(--cream-warm); }
details.disclosure summary::after {
  content: '+';
  font-family: var(--serif); font-size: 22px;
  color: var(--gold-deep); transition: transform 0.3s ease;
  font-weight: 300;
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
}
details.disclosure[open] summary::after { transform: rotate(45deg); }
details.disclosure .disclosure-body {
  padding: 4px 24px 24px;
  font-size: 14.5px;
  line-height: 1.8;
  color: var(--ink-soft);
}

/* 五種過程定義表 */
.process-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 14px;
  font-size: 14px;
}
.process-table th, .process-table td {
  padding: 10px 12px;
  text-align: left;
  border-bottom: 1px solid var(--line-soft);
  vertical-align: top;
}
.process-table th {
  background: var(--cream-warm);
  font-family: var(--serif);
  font-weight: 600;
  color: var(--navy-deep);
  font-size: 13px;
  letter-spacing: 0.03em;
}
.process-table td.proc-code {
  font-family: var(--mono); font-weight: 700;
  color: var(--gold-deep);
  width: 60px;
}
.process-table td.proc-name {
  font-weight: 600; color: var(--navy);
  width: 130px;
}

/* ============================================================
   STEP 1 — 情境輸入頁
   ============================================================ */
.section-eyebrow {
  font-family: var(--mono); font-size: 11px;
  color: var(--gold-deep); letter-spacing: 0.3em; text-transform: uppercase;
  margin-bottom: 14px;
}
.section-title {
  font-family: var(--serif);
  font-size: 36px; font-weight: 700;
  color: var(--navy-deep);
  letter-spacing: -0.01em;
  margin-bottom: 8px;
}
.section-title-en {
  font-family: var(--serif); font-style: italic;
  font-size: 17px; color: var(--ink-mute);
  margin-bottom: 32px;
}
.section-intro {
  font-size: 16px; color: var(--ink-soft);
  line-height: 1.85;
  max-width: 720px;
  margin-bottom: 36px;
}
.scenario-input {
  width: 100%;
  min-height: 140px;
  padding: 18px 20px;
  font-family: inherit; font-size: 16px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 2px;
  color: var(--ink);
  line-height: 1.7;
  resize: vertical;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}
.scenario-input:focus {
  outline: none;
  border-color: var(--navy);
  box-shadow: 0 0 0 3px rgba(30,58,95,0.08);
}
.scenario-hint {
  font-size: 13px; color: var(--ink-mute);
  font-style: italic;
  margin-top: 10px;
}

/* 通用按鈕 */
.btn-row {
  display: flex; gap: 14px; flex-wrap: wrap;
  margin-top: 36px; align-items: center;
}
.btn {
  font-family: var(--sans); font-size: 14.5px;
  font-weight: 500;
  padding: 14px 28px;
  border: none;
  cursor: pointer;
  transition: all 0.25s ease;
  letter-spacing: 0.04em;
  border-radius: 2px;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn-primary {
  background: var(--navy);
  color: var(--cream);
  border: 1px solid var(--navy);
}
.btn-primary:hover { background: var(--navy-deep); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.btn-gold {
  background: var(--gold);
  color: var(--navy-deep);
  border: 1px solid var(--gold-deep);
  font-weight: 600;
}
.btn-gold:hover { background: var(--gold-deep); color: var(--cream); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.btn-ghost {
  background: transparent;
  color: var(--navy);
  border: 1px solid var(--line);
}
.btn-ghost:hover { background: var(--cream-warm); border-color: var(--navy); }
.btn-text {
  background: transparent; color: var(--ink-soft);
  border: none; padding: 12px 16px;
  text-decoration: underline; text-underline-offset: 4px;
  text-decoration-color: var(--line);
}
.btn-text:hover { color: var(--navy); text-decoration-color: var(--gold); }

/* ============================================================
   STEP 2 — 12 題診斷頁
   ============================================================ */
.progress-bar {
  position: sticky; top: 78px;
  background: var(--cream);
  padding: 16px 0 14px;
  margin: -16px -28px 28px;
  padding-left: 28px; padding-right: 28px;
  border-bottom: 1px solid var(--line-soft);
  z-index: 50;
  display: flex; align-items: center; gap: 16px;
}
.progress-track {
  flex: 1; height: 3px;
  background: var(--line-soft);
  position: relative;
  overflow: hidden;
}
.progress-fill {
  position: absolute; top: 0; left: 0; height: 100%;
  background: linear-gradient(90deg, var(--gold-deep), var(--gold));
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.progress-text {
  font-family: var(--mono); font-size: 12px;
  color: var(--navy);
  letter-spacing: 0.08em;
  white-space: nowrap;
}

.question-block {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 2px;
  padding: 32px 36px;
  margin-bottom: 20px;
  position: relative;
  transition: all 0.3s ease;
}
.question-block:hover { box-shadow: var(--shadow-sm); }
.question-block.answered {
  border-left: 3px solid var(--gold);
}
.question-header {
  display: flex; align-items: baseline; gap: 14px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.question-num {
  font-family: var(--serif);
  font-size: 14px; font-style: italic;
  color: var(--gold-deep);
  font-weight: 500;
  letter-spacing: 0.05em;
}
.question-code {
  font-family: var(--mono); font-size: 11px;
  background: var(--navy);
  color: var(--cream);
  padding: 3px 9px;
  letter-spacing: 0.1em;
  border-radius: 2px;
}
.question-name {
  font-family: var(--serif);
  font-size: 22px; font-weight: 600;
  color: var(--navy-deep);
  letter-spacing: -0.005em;
}
.question-name-en {
  font-family: var(--serif); font-style: italic;
  font-size: 14px; color: var(--ink-mute);
  margin-left: auto;
}
.question-text {
  font-size: 16px;
  color: var(--ink);
  line-height: 1.75;
  margin-bottom: 6px;
}
.question-text-en {
  font-family: var(--serif); font-style: italic;
  font-size: 14.5px;
  color: var(--ink-mute);
  line-height: 1.7;
  margin-bottom: 24px;
  padding-left: 14px;
  border-left: 2px solid var(--line);
}

/* 1-5 量表 — 圓圈式 */
.scale-row {
  display: flex; align-items: center; gap: 8px;
  margin: 20px 0 12px;
  flex-wrap: wrap;
}
.scale-circles {
  display: flex; gap: 10px;
  flex: 1; min-width: 280px;
  justify-content: space-between;
  max-width: 460px;
}
.scale-circle {
  width: 48px; height: 48px;
  border: 1.5px solid var(--line);
  background: var(--cream);
  border-radius: 50%;
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: var(--serif);
  font-size: 18px; font-weight: 600;
  color: var(--ink-mute);
  display: flex; align-items: center; justify-content: center;
}
.scale-circle:hover {
  border-color: var(--navy);
  color: var(--navy);
  transform: scale(1.08);
}
.scale-circle.selected {
  background: var(--navy);
  border-color: var(--navy-deep);
  color: var(--cream);
  box-shadow: 0 0 0 4px rgba(30,58,95,0.12);
  transform: scale(1.05);
}
.scale-circle.selected.gold-mode {
  background: var(--gold);
  border-color: var(--gold-deep);
  color: var(--navy-deep);
  box-shadow: 0 0 0 4px rgba(201,169,97,0.18);
}
.scale-labels {
  display: flex; justify-content: space-between;
  font-family: var(--mono); font-size: 10.5px;
  color: var(--ink-mute);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  max-width: 460px;
  margin-bottom: 18px;
}
.scale-label-mid {
  display: flex; justify-content: space-between;
  max-width: 460px;
  font-size: 11px;
  color: var(--ink-mute);
  margin-top: -4px; margin-bottom: 16px;
  padding: 0 12px;
}

/* 二元 (TC/GD) 按鈕 */
.binary-row {
  display: flex; gap: 12px;
  margin: 20px 0 16px;
}
.binary-btn {
  flex: 1; max-width: 220px;
  padding: 18px 24px;
  border: 1.5px solid var(--line);
  background: var(--cream);
  cursor: pointer;
  font-family: inherit; font-size: 15px;
  color: var(--ink);
  transition: all 0.2s ease;
  border-radius: 2px;
  text-align: left;
}
.binary-btn .bb-yn {
  font-family: var(--serif); font-size: 18px; font-weight: 600;
  color: var(--navy);
  display: block; margin-bottom: 4px;
}
.binary-btn .bb-en {
  font-family: var(--mono); font-size: 11px;
  color: var(--ink-mute); letter-spacing: 0.1em;
}
.binary-btn:hover {
  border-color: var(--navy); transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}
.binary-btn.selected {
  background: var(--navy); border-color: var(--navy-deep);
}
.binary-btn.selected .bb-yn { color: var(--cream); }
.binary-btn.selected .bb-en { color: var(--gold); }

/* 替代問句 / 詳細說明 / 教學案例 */
.q-aux {
  margin-top: 18px;
  display: flex; flex-direction: column; gap: 10px;
}
.q-aux details {
  font-size: 14px;
  border-top: 1px solid var(--line-soft);
  padding-top: 14px;
}
.q-aux details summary {
  cursor: pointer;
  color: var(--navy);
  font-weight: 500;
  list-style: none;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 0;
  user-select: none;
}
.q-aux details summary::-webkit-details-marker { display: none; }
.q-aux details summary::before {
  content: '▸';
  font-size: 10px; transition: transform 0.2s ease;
  color: var(--gold-deep);
}
.q-aux details[open] summary::before { transform: rotate(90deg); }
.q-aux details summary:hover { color: var(--gold-deep); }
.q-aux .aux-body {
  padding: 12px 16px 4px 22px;
  font-size: 14px; color: var(--ink-soft);
  line-height: 1.75;
}
.q-aux .aux-body em {
  font-style: italic; color: var(--ink-mute);
}
.q-aux .case-body {
  background: var(--cream-warm);
  padding: 14px 18px;
  border-left: 3px solid var(--gold);
  margin-top: 8px;
  font-size: 14px;
  line-height: 1.75;
  border-radius: 0 2px 2px 0;
}
.q-aux .case-body .case-label {
  font-family: var(--serif); font-style: italic;
  font-size: 13px; color: var(--gold-deep);
  margin-bottom: 4px;
}

/* ============================================================
   STEP 3 — 結果報告頁
   ============================================================ */
.report-banner {
  background: linear-gradient(135deg, var(--navy-deep) 0%, var(--navy) 60%, var(--navy-soft) 100%);
  color: var(--cream);
  padding: 48px 44px;
  margin-bottom: 32px;
  border-radius: 2px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-md);
}
.report-banner::before {
  content: '';
  position: absolute; top: -50%; right: -10%;
  width: 60%; height: 200%;
  background: radial-gradient(ellipse at center, rgba(201,169,97,0.15) 0%, transparent 60%);
  pointer-events: none;
}
.report-banner-eyebrow {
  font-family: var(--mono); font-size: 11px;
  color: var(--gold); letter-spacing: 0.3em; text-transform: uppercase;
  margin-bottom: 18px;
  display: flex; align-items: center; gap: 12px;
}
.report-banner-eyebrow::before {
  content: ''; width: 28px; height: 1px; background: var(--gold);
}
.report-rec-label {
  font-family: var(--serif); font-style: italic;
  font-size: 18px; color: rgba(248,245,240,0.7);
  margin-bottom: 10px;
}
.report-rec-name {
  font-family: var(--serif); font-size: clamp(40px, 6vw, 64px);
  font-weight: 700; line-height: 1.05;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
}
.report-rec-name .rec-code {
  font-style: italic;
  color: var(--gold);
  margin-right: 16px;
}
.report-rec-en {
  font-family: var(--serif); font-style: italic;
  font-size: 18px; color: rgba(248,245,240,0.65);
  margin-bottom: 24px;
}
.report-rec-desc {
  font-size: 16px; line-height: 1.8;
  color: rgba(248,245,240,0.92);
  max-width: 680px;
  margin-bottom: 24px;
}
.report-rec-score {
  display: flex; align-items: baseline; gap: 12px;
  padding-top: 22px;
  border-top: 1px solid rgba(201,169,97,0.3);
}
.report-rec-score-label {

  }
};

/* ============================================================
   2. 計算引擎
   ============================================================ */

/**
 * 將 1-5 原始輸入重新編碼為計算用數值
 * @param {Object} rawInputs - 原始輸入物件 {QR:5, CR:4, ...}
 * @param {string} problemType - 'group' | 'individual'
 * @returns {Object} 重新編碼後的數值物件
 */
function rescaleAttributes(rawInputs, problemType) {
  const scaled = {};
  const keys = ['QR','CR','LI','ST','CP','GC','CO','SI','TC','MT','MD'];
  if (problemType === 'group') keys.push('GD');
  for (const k of keys) {
    if (rawInputs[k] === undefined || rawInputs[k] === null) {
      scaled[k] = 0;
    } else {
      scaled[k] = RESCALE[k][rawInputs[k]];
    }
  }
  // 個人問題:GD 不適用,設為 0
  if (problemType === 'individual') scaled.GD = 0;
  return scaled;
}

/**
 * 團體模型計算
 * @param {Object} s - rescaled 屬性 {QR, CR, ...}
 * @param {Object} c - 過程係數 {f1, f2, f3, f4}
 * @returns {Object} {D_Qual, D_Comm, D_TP, Cost, Devpt, D_Eff, O_Eff}
 */
function calculateGroupModel(s, c) {
  const { QR, CR, LI, ST, CP, GC, CO, SI, TC, GD, MT, MD } = s;
  const { f1, f2, f3, f4 } = c;

  const D_Qual = QR - (QR/2) * (
    (f2*LI) + (f4*LI*ST) + (f3*GC)
    + (f1*LI*(1+GC)*CO/2)
    + (f3*SI/2)
  );

  const D_Comm = CR - (CR/2) * (
    (f1*CP) - ((f3+f4+1)*CO*CP/2)
  );

  const D_TP = (D_Qual + D_Comm) * (1+f1) * TC;

  const Cost = (MT/6) * (
    (1+f1)*(1-ST) - ((f3+f4-1)*CO/2)
  ) - 5*(f4-1)*GD;

  // 注意:依 Vroom & Jago (1988) 原書 p.184, Devpt 用 (1+f1) 而非 (1+f4)
  const Devpt = (MD/24) * QR * (
    (1+f1) - ((f3+f4-1)*(GC+0.5)*CO)
  );

  const D_Eff = D_Qual + D_Comm - D_TP;
  const O_Eff = D_Eff - Cost + Devpt;

  return { D_Qual, D_Comm, D_TP, Cost, Devpt, D_Eff, O_Eff };
}

/**
 * 個人模型計算
 * @param {Object} s - rescaled 屬性
 * @param {Object} c - 過程係數 {f1...f6}
 * @returns {Object} {D_Qual, D_Comm, D_TP, Cost, Devpt, D_Eff, O_Eff}
 */
function calculateIndividualModel(s, c) {
  const { QR, CR, LI, ST, CP, GC, CO, SI, TC, MT, MD } = s;
  const { f1, f2, f3, f4, f5, f6 } = c;

  const D_Qual = QR - (QR/2) * (
    (f2*LI) + (f4*LI*ST) + 2*(f3*GC) + 2*(f3*SI)
    + (f6*LI*(1+GC)*CO/2)
    + (f5*GC*(1+(CR*CP/4)))
  );

  const D_Comm = CR - CR * (f1*CP);

  const D_TP = ( (D_Qual+D_Comm)*(1+f6) + (f3*QR*(SI+GC)) ) * TC;

  const Cost = (MT/6) * ( (1+f6)*(1-ST) - (f5*CO) );

  const Devpt = (MD/24) * QR * ( (1+f1) - 2*(f5*(GC+0.5)*CO) );

  const D_Eff = D_Qual + D_Comm - D_TP;
  const O_Eff = D_Eff - Cost + Devpt;

  return { D_Qual, D_Comm, D_TP, Cost, Devpt, D_Eff, O_Eff };
}

/**
 * 對所有決策過程進行評估
 * @param {Object} scaled - rescaled 屬性
 * @param {string} problemType - 'group' | 'individual'
 * @returns {Object} {AI: {...}, AII: {...}, ...}
 */
function evaluateAllProcesses(scaled, problemType) {
  const procs = problemType === 'group' ? PROCESSES_GROUP : PROCESSES_INDIV;
  const calc  = problemType === 'group' ? calculateGroupModel : calculateIndividualModel;
  const out = {};
  for (const name of Object.keys(procs)) {
    out[name] = calc(scaled, procs[name]);
  }
  return out;
}

/**
 * 取得推薦的決策過程（O_Eff 最大者；同分時依優先順序）
 * @param {Object} results - evaluateAllProcesses 的輸出
 * @param {string} problemType
 * @returns {string} 推薦過程的代碼
 */
function getRecommendedProcess(results, problemType) {
  const priority = problemType === 'group' ? PRIORITY_GROUP : PRIORITY_INDIV;
  let best = null, bestScore = -Infinity, bestPriority = Infinity;
  for (const name of Object.keys(results)) {
    const score = results[name].O_Eff;
    const pIdx = priority.indexOf(name);
    if (score > bestScore + 1e-9) {
      best = name; bestScore = score; bestPriority = pIdx;
    } else if (Math.abs(score - bestScore) < 1e-9) {
      if (pIdx < bestPriority) { best = name; bestPriority = pIdx; }
    }
  }
  return best;
}

/**
 * 取得排名後的過程清單
 */
function getRankedProcesses(results, problemType) {
  const priority = problemType === 'group' ? PRIORITY_GROUP : PRIORITY_INDIV;
  return Object.entries(results)
    .map(([name, r]) => ({ name, ...r, priorityIdx: priority.indexOf(name) }))
    .sort((a, b) => {
      if (Math.abs(a.O_Eff - b.O_Eff) > 1e-9) return b.O_Eff - a.O_Eff;
      return a.priorityIdx - b.priorityIdx;
    });
}

/* ============================================================
   3. 解釋生成器
   ============================================================ */

/**
 * 根據推薦結果產生解釋文字段落
 */
function generateExplanation(rawInputs, scaled, recommended, problemType) {
  const defs = problemType === 'group' ? PROCESS_DEFS.group : PROCESS_DEFS.individual;
  const def = defs[recommended];
  const r = rawInputs;
  const out = [];

  // (1) 為何推薦
  let why = `根據您的診斷,系統推薦採用 <strong>${recommended}（${def.tw}）</strong>。本決策過程的整體效能 (O_Eff) 在五種選項中最高,反映其在「決策品質」、「部屬承諾」、「時間成本」與「人才發展」四個面向之間取得最佳平衡。`;

  // 引用關鍵屬性
  const cues = [];
  if (r.QR >= 4) cues.push(`品質要求高 (QR=${r.QR})`);
  if (r.QR <= 2) cues.push(`品質要求低 (QR=${r.QR})`);
  if (r.CR >= 4) cues.push(`承諾要求高 (CR=${r.CR})`);
  if (r.CR <= 2) cues.push(`承諾要求低 (CR=${r.CR})`);
  if (r.LI <= 2) cues.push(`領導者資訊不足 (LI=${r.LI})`);
  if (r.GC >= 4) cues.push(`部屬目標一致性高 (GC=${r.GC})`);
  if (r.GC <= 2) cues.push(`部屬目標一致性低 (GC=${r.GC})`);
  if (r.CO >= 4) cues.push(`部屬衝突可能性高 (CO=${r.CO})`);
  if (r.SI >= 4) cues.push(`部屬資訊充分 (SI=${r.SI})`);
  if (r.TC === 5) cues.push(`時間極度緊迫 (TC=Yes)`);
  if (problemType === 'group' && r.GD === 5) cues.push(`部屬地理分散 (GD=Yes)`);
  if (cues.length) {
    why += `<br><br>關鍵診斷指標包括：${cues.map(c => `<strong>${c}</strong>`).join('、')}。這些屬性共同形塑了本決策情境的特徵,使得 ${recommended} 成為最適選擇。`;
  }
  out.push({ title: '為何推薦此決策過程', body: why });

  // (2) 過程簡介
  out.push({ title: `${recommended}（${def.tw}）的內涵`, body: def.desc });

  // (3) 實施建議
  const tipsGroup = {
    AI:  ['迅速基於現有資訊作出決定,不需召集會議。', '決策後應簡明扼要地告知部屬決策內容與必要的執行說明。'],
    AII: ['先向關鍵部屬蒐集所需資訊（可一對一或書面）,但不揭露決策本身。','蒐集到足夠資訊後,獨立做出判斷並下達指示。'],
    CI:  ['依序與相關部屬個別會談,徵詢其見解與建議。','綜合各方意見後,由您獨立做出最終決策。','決策不必反映多數意見,但應展現對每位被諮詢者意見的尊重。'],
    CII: ['召集部屬於團體會議中,公開分享問題並徵詢意見。','您主導會議流程,但保留最終決策權。','會議後可說明決策考量,即使未完全採納部屬建議。'],
    GII: ['以團體會議形式,您僅擔任主席,協助引導討論。','鼓勵部屬主動產生方案、評估方案。','尋求共識,在多元意見中收斂出大家都能接受的決定,您不應利用權威操控結果。']
  };
  const tipsIndiv = {
    AI:  ['基於現有資訊獨自決定,毋須與該部屬討論。','決策後簡要告知該部屬。'],
    AII: ['先向該部屬蒐集事實性資訊（不揭露決策意圖）。','取得資訊後獨立決策。'],
    CI:  ['與該部屬一對一深入討論,徵詢其想法。','聽取後由您獨立做出最終決策,可採納或不採納其建議。'],
    GI:  ['以平等夥伴方式與該部屬共同分析問題。','尋求雙方都能接受的共識方案,您不應強行主導。'],
    DI:  ['將問題與決策權完整授權給該部屬。','提供必要資源、資訊與支持,但不干預其決策過程。','確認該部屬瞭解授權範圍與責任,並接受其最終決定。']
  };
  const tips = problemType === 'group' ? tipsGroup[recommended] : tipsIndiv[recommended];
  out.push({ title: '實施建議', body: '<ul>' + tips.map(t => `<li>${t}</li>`).join('') + '</ul>' });

  // (4) 注意事項
  const cautions = [];
  if (recommended === 'AI' || recommended === 'AII') {
    if (r.CR >= 4) cautions.push('雖然系統推薦獨裁式決策,但承諾要求較高,決策後務必清楚溝通決策理由,以維持部屬支持。');
    if (r.CP <= 2) cautions.push('部屬接受獨自決策的可能性偏低,建議在決策後額外進行說明會或一對一溝通,降低抗拒。');
  }
  if (recommended === 'CI' || recommended === 'CII') {
    if (r.CO >= 4) cautions.push('部屬之間可能存在衝突,團體會議形式（CII）較能公開處理分歧；若您採用 CI,則需個別調和不同立場。');
    cautions.push('諮詢後若未完全採納部屬建議,務必清楚說明您的決策邏輯,以維護信任關係。');
  }
  if (recommended === 'GII' || recommended === 'GI') {
    if (r.GC <= 3) cautions.push('部屬目標一致性不算高,團體共識過程中需特別留意是否有派系利益凌駕組織利益。');
    cautions.push('採用共識決策時,您應避免運用職權壓制不同意見,讓討論真正開放。');
    if (r.TC === 5) cautions.push('注意：時間限制嚴重的情境下,團體共識可能難以及時達成,需審慎評估時程。');
  }
  if (recommended === 'DI') {
    cautions.push('授權後不應頻繁干預,給予該部屬足夠的決策空間,但保持資源支援與必要溝通。');
    if (r.SI <= 2) cautions.push('該部屬資訊充分度偏低,授權前建議協助其取得必要資料與專業諮詢管道。');
  }
  if (problemType === 'group' && r.GD === 5 && (recommended === 'CII' || recommended === 'GII')) {
    cautions.push('部屬地理分散,召集團體會議成本較高,可考慮善用視訊會議與非同步協作工具。');
  }
  if (cautions.length === 0) cautions.push('在執行過程中保持開放溝通,並適時檢視決策成效。');
  out.push({ title: '注意事項', body: '<ul>' + cautions.map(c => `<li>${c}</li>`).join('') + '</ul>' });

  return out;
}

      <h2 class="section-title">描述您的決策情境</h2>
      <div class="section-title-en">Describe the Decision Scenario</div>
      <p class="section-intro">
        以一兩句話描述您正在面對的決策情境。這段描述會出現在最終的診斷報告中,
        作為決策紀錄的一部分。<em>（此步驟為選填,可直接跳過進入診斷）</em>
      </p>
      <textarea class="scenario-input" id="scenario-input" placeholder=""></textarea>
      <div class="scenario-hint">— 此資訊僅在您本機處理,不會傳送至任何伺服器 —</div>
      <div class="btn-row">
        <button class="btn btn-primary" id="next-btn">進入問題診斷 →</button>
        <button class="btn btn-text" id="back-btn">← 返回上一步</button>
      </div>
    </div>
  `;
  document.getElementById('scenario-input').value = state.scenario;
  document.getElementById('next-btn').addEventListener('click', () => {
    state.scenario = document.getElementById('scenario-input').value.trim();
    state.step = 2;
    render();
  });
  document.getElementById('back-btn').addEventListener('click', () => {
    state.scenario = document.getElementById('scenario-input').value.trim();
    state.step = 0; render();
  });
}

/** Step 2:12 題屬性診斷 */
function renderQuestions() {
  const isGroup = state.problemType === 'group';
  const typeLabel = isGroup ? '團體問題 · Group Problem' : '個人問題 · Individual Problem';

  // 個人問題跳過 GD;個人問題的 CO 題目調整
  const questions = ATTRIBUTES.filter(a => !(a.code === 'GD' && !isGroup)).map(a => {
    if (!isGroup && a.code === 'CO') {
      return {
        ...a,
        question: '您與該部屬之間就偏好的解決方案產生衝突的可能性有多高？',
        questionEn: 'Is conflict between you and the subordinate over preferred solutions likely?',
        altQuestion: '您預期該部屬會強烈反對您傾向的方案嗎？'
      };
    }
    return a;
  });

  const totalQ = questions.length;
  const answeredCount = questions.filter(q => state.answers[q.code] !== undefined).length;
  const progressPct = Math.round((answeredCount / totalQ) * 100);

  let html = `
    <div class="section-eyebrow">Step 2 · ${typeLabel}</div>
    <h2 class="section-title">問題屬性診斷</h2>
    <div class="section-title-en">Diagnose ${totalQ} Problem Attributes</div>
    <p class="section-intro">
      請依您的判斷,對每項屬性給予 1–5 分評分（時間限制與地理分散為「是 / 否」二選一）。
      可隨時展開「💡 替代問句」與「📘 詳細說明」協助理解。
    </p>

    <div class="progress-bar">
      <div class="progress-track"><div class="progress-fill" style="width:${progressPct}%"></div></div>
      <div class="progress-text">${answeredCount} / ${totalQ} · ${progressPct}%</div>
    </div>
  `;

  questions.forEach((q, idx) => {
    const num = idx + 1;
    const ans = state.answers[q.code];
    const answered = ans !== undefined;
    const isBinary = q.scale === 'binary';

    let scaleHtml = '';
    if (isBinary) {
      // TC / GD 二元
      const yesLabel = q.code === 'TC' ? '時間極度緊迫' : '部屬地理分散';
      const noLabel  = q.code === 'TC' ? '時間充裕' : '部屬同處一地';
      scaleHtml = `
        <div class="binary-row">
          <button class="binary-btn ${ans === 1 ? 'selected' : ''}" data-code="${q.code}" data-val="1">
            <span class="bb-yn">否 · No</span>
            <span class="bb-en">${noLabel}</span>
          </button>
          <button class="binary-btn ${ans === 5 ? 'selected' : ''}" data-code="${q.code}" data-val="5">
            <span class="bb-yn">是 · Yes</span>
            <span class="bb-en">${yesLabel}</span>
          </button>
        </div>
      `;
    } else {
      // 1-5 量表
      const goldMode = (q.scale === 'importance');
      // 依 scale 類型選擇對應的英文與中文標籤
      const labelsMap = {
        importance:  [SCALE_LABELS.importance,  SCALE_LABELS.importanceTw],
        probability: [SCALE_LABELS.probability, SCALE_LABELS.probabilityTw],
        sufficiency: [SCALE_LABELS.sufficiency, SCALE_LABELS.sufficiencyTw],
        structure:   [SCALE_LABELS.structure,   SCALE_LABELS.structureTw],
        conflict:    [SCALE_LABELS.conflict,    SCALE_LABELS.conflictTw]
      };
      const [labels, labelsTw] = labelsMap[q.scale] || labelsMap.probability;
      const circles = [1,2,3,4,5].map(n => {
        const sel = ans === n ? `selected ${goldMode ? 'gold-mode' : ''}` : '';
        return `<button class="scale-circle ${sel}" data-code="${q.code}" data-val="${n}">${n}</button>`;
      }).join('');
      scaleHtml = `
        <div class="scale-row">
          <div class="scale-circles">${circles}</div>
        </div>
        <div class="scale-labels">
          <span>1 · ${labels[0]}</span>
          <span>5 · ${labels[4]}</span>
        </div>
        <div class="scale-label-mid">
          <span style="font-family:var(--serif);color:var(--ink-mute)">${labelsTw[0]}</span>
          <span style="font-family:var(--serif);color:var(--ink-mute)">${labelsTw[2]}</span>
          <span style="font-family:var(--serif);color:var(--ink-mute)">${labelsTw[4]}</span>
        </div>
      `;
    }

    html += `
      <section class="question-block ${answered ? 'answered' : ''}" id="q-${q.code}">
        <div class="question-header">
          <span class="question-num">Q ${String(num).padStart(2, '0')}</span>
          <span class="question-code">${q.code}</span>
          <span class="question-name">${q.name}</span>
          <span class="question-name-en">${q.nameEn}</span>
        </div>
        <div class="question-text">${q.question}</div>
        <div class="question-text-en">${q.questionEn}</div>
        ${scaleHtml}
        <div class="q-aux">
          <details>
            <summary>💡 替代問句 · Alternative Question</summary>
            <div class="aux-body"><em>${q.altQuestion}</em></div>
          </details>
          <details>
            <summary>📘 詳細說明 · Definition</summary>
            <div class="aux-body">${q.detail}</div>
          </details>
        </div>
      </section>
    `;
  });

  html += `
    <div class="btn-row" style="margin-top:36px">
      <button class="btn btn-gold" id="calc-btn" ${answeredCount < totalQ ? 'disabled style="opacity:0.5;cursor:not-allowed"' : ''}>
        計算結果 · Compute Result →
      </button>
      <button class="btn btn-ghost" id="back-btn">← 修改情境</button>
      <button class="btn btn-text" id="reset-btn">🔄 重新開始</button>
    </div>
    ${answeredCount < totalQ ? `<div style="margin-top:14px;font-size:13px;color:var(--ink-mute);font-style:italic">— 尚有 ${totalQ - answeredCount} 題未作答 —</div>` : ''}
  `;

  app.innerHTML = html;

  // 綁定量表
  document.querySelectorAll('.scale-circle, .binary-btn').forEach(b => {
    b.addEventListener('click', () => {
      const code = b.dataset.code;
      const val = parseInt(b.dataset.val, 10);
      state.answers[code] = val;
      // 局部更新此題視覺
      renderQuestions();
      // 自動捲動到下一題
      setTimeout(() => {
        const cur = document.getElementById(`q-${code}`);
        if (cur) {
          const idx = questions.findIndex(qq => qq.code === code);
          const next = questions[idx + 1];
          if (next) {
            const nextEl = document.getElementById(`q-${next.code}`);
            if (nextEl && state.answers[next.code] === undefined) {
              nextEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
          }
        }
      }, 150);
    });
  });

  document.getElementById('calc-btn')?.addEventListener('click', () => {
    if (Object.keys(state.answers).length < totalQ) return;
    computeAndShow();
  });
  document.getElementById('back-btn')?.addEventListener('click', () => {
    state.step = 1; render();
  });
  document.getElementById('reset-btn')?.addEventListener('click', () => {
    if (confirm('確定要重新開始嗎?目前的作答將清除。')) {
      state.step = 0; state.answers = {}; state.scenario = ''; state.problemType = null;
      render();
    }
  });
}

/** 執行計算並切換至報告頁 */
function computeAndShow() {
  const scaled = rescaleAttributes(state.answers, state.problemType);
  const results = evaluateAllProcesses(scaled, state.problemType);
  const recommended = getRecommendedProcess(results, state.problemType);
  state.results = { scaled, results, recommended };
  state.recommended = recommended;
  state.step = 3;
  render();
}

/** Step 3:結果報告 */
function renderResult() {
  const { scaled, results, recommended } = state.results;
  const isGroup = state.problemType === 'group';
  const defs = isGroup ? PROCESS_DEFS.group : PROCESS_DEFS.individual;
  const def = defs[recommended];
  const ranked = getRankedProcesses(results, state.problemType);

  // 找最大絕對值供長條圖比例
  const maxAbs = Math.max(...ranked.map(r => Math.abs(r.O_Eff)), 0.01);

  // (B) 比較表
  const tableRows = ranked.map((r, i) => {
    const rec = r.name === recommended;
    const f = (x) => x.toFixed(2);
    return `
      <tr class="${rec ? 'recommended' : ''}">
        <td>${r.name} <span style="font-family:var(--serif);font-style:italic;font-weight:400;color:var(--ink-mute);font-size:12px">${defs[r.name].tw}</span></td>
        <td>${f(r.D_Qual)}</td>
        <td>${f(r.D_Comm)}</td>
        <td>${f(r.D_TP)}</td>
        <td>${f(r.Cost)}</td>
        <td>${f(r.Devpt)}</td>
        <td>${f(r.D_Eff)}</td>
        <td class="col-oeff">${f(r.O_Eff)}</td>
        <td><span class="col-rank">${i + 1}</span></td>
      </tr>
    `;
  }).join('');

  // 長條圖（左右對稱,中央 0)
  const chartRows = ranked.map(r => {
    const rec = r.name === recommended;
    const pct = Math.abs(r.O_Eff) / maxAbs * 50; // 最大 50%（半邊）
    const isNeg = r.O_Eff < 0;
    const left = isNeg ? (50 - pct) : 50;
    const cls = rec ? 'gold' : (isNeg ? 'negative' : '');
    return `
      <div class="chart-row">
        <div class="chart-label">${r.name}</div>
        <div class="chart-track">
          <div class="chart-bar ${cls}" style="left:${left}%; width:${pct}%"></div>
        </div>
        <div class="chart-value">${r.O_Eff.toFixed(2)}</div>
      </div>
    `;
  }).join('');

  // (C) 屬性回顧
  const reviewKeys = ['QR','CR','LI','ST','CP','GC','CO','SI','TC','MT','MD'];
  if (isGroup) reviewKeys.splice(9, 0, 'GD');
  const attrCells = reviewKeys.map(k => {
    const a = ATTRIBUTES.find(x => x.code === k);
    return `
      <div class="attr-cell">
        <div class="ac-code">${k}</div>
        <div class="ac-name">${a.name}</div>
        <div class="ac-vals">
          <div class="ac-raw"><span class="ac-raw-label">原始</span><span class="ac-raw-val">${state.answers[k]}</span></div>
          <div class="ac-scaled"><span class="ac-scaled-label">編碼</span><span class="ac-scaled-val">${scaled[k]}</span></div>
        </div>
      </div>
    `;
  }).join('');

  // (D) 解釋
  const explanations = generateExplanation(state.answers, scaled, recommended, state.problemType);
  const explanationHtml = explanations.map(e => `
    <div class="explanation-section">
      <h4>${e.title}</h4>
      ${e.body.startsWith('<') ? e.body : '<p>' + e.body + '</p>'}
    </div>
  `).join('');

  app.innerHTML = `
    <div class="report-banner">
      <div class="report-banner-eyebrow">Decision Recommendation</div>
      <div class="report-rec-label">建議採用 · Recommended Process</div>
      <div class="report-rec-name">
        <span class="rec-code">${recommended}</span>${def.tw}
      </div>
      <div class="report-rec-en">${def.en}</div>
      <div class="report-rec-desc">${def.desc}</div>
      <div class="report-rec-score">
        <div class="report-rec-score-label">Overall Effectiveness</div>
        <div class="report-rec-score-val">${results[recommended].O_Eff.toFixed(2)}</div>
      </div>
    </div>

    ${state.scenario ? `
    <div class="report-scenario-card">
      <div class="report-scenario-label">— Decision Scenario —</div>
      <div class="report-scenario-text">${escapeHtml(state.scenario)}</div>
    </div>` : ''}

    <section class="report-section">
      <h3 class="report-section-title" data-num="A.">五種決策過程比較</h3>
      <div class="report-section-en">Comparison of Five Decision Processes</div>
      <div class="results-table-wrap">
        <table class="results-table">
          <thead>
            <tr>
              <th>過程 Process</th>
              <th>D_Qual</th>
              <th>D_Comm</th>
              <th>D_TP</th>
              <th>Cost</th>
              <th>Devpt</th>
              <th>D_Eff</th>
              <th>O_Eff</th>
              <th>排名</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
      <div class="chart-wrap">
        <div class="chart-title">— O_Eff 視覺化（金色為推薦過程 · 紅色為負分）—</div>
        ${chartRows}
      </div>
    </section>

    <section class="report-section">
      <h3 class="report-section-title" data-num="B.">屬性診斷回顧</h3>
      <div class="report-section-en">Attribute Diagnosis Review (Raw &amp; Rescaled)</div>
      <div class="attr-review">${attrCells}</div>
    </section>

    <section class="report-section">
      <h3 class="report-section-title" data-num="C.">解釋與實施建議</h3>
      <div class="report-section-en">Interpretation &amp; Implementation Guidelines</div>
      <div class="explanation">${explanationHtml}</div>
    </section>

    <div class="btn-row">
      <button class="btn btn-primary" id="restart-btn">🔄 重新診斷</button>
      <button class="btn btn-ghost" id="export-btn">📥 匯出 JSON</button>
      <button class="btn btn-ghost" id="print-btn">🖨 列印報告</button>
      <button class="btn btn-text" id="back-edit-btn">← 修改作答</button>
    </div>
  `;

  document.getElementById('restart-btn').addEventListener('click', () => {
    if (confirm('確定要重新開始嗎?')) {
      state.step = 0; state.answers = {}; state.scenario = ''; state.problemType = null;
      state.results = null; state.recommended = null;
      render();
    }
  });
  document.getElementById('export-btn').addEventListener('click', exportJSON);
  document.getElementById('print-btn').addEventListener('click', () => window.print());
  document.getElementById('back-edit-btn').addEventListener('click', () => {
    state.step = 2; render();
  });
}

/** 匯出診斷結果為 JSON 檔 */
function exportJSON() {
  const data = {
    metadata: {
      system: 'Vroom-Jago Decision-Making Expert System',
      reference: 'Vroom & Jago (1988); Vroom & Yetton (1973)',
      timestamp: new Date().toISOString(),
      problemType: state.problemType
    },
    scenario: state.scenario,
    rawInputs: state.answers,
    rescaledInputs: state.results.scaled,
    processResults: state.results.results,
    recommendation: {
      process: state.recommended,
      processNameTw: (state.problemType === 'group' ? PROCESS_DEFS.group : PROCESS_DEFS.individual)[state.recommended].tw,
      processNameEn: (state.problemType === 'group' ? PROCESS_DEFS.group : PROCESS_DEFS.individual)[state.recommended].en,
      O_Eff: state.results.results[state.recommended].O_Eff
    }
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const fname = `vroom-jago-${state.problemType}-${state.recommended}-${Date.now()}.json`;
  a.href = url; a.download = fname; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

/** HTML 跳脫 */
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
  );
}

/** 載入測試案例 */
function loadTestCase(c) {
  const cases = {
    A: { type: 'group',      scenario: '【測試案例 A】系務會議是否要修訂研究生畢業審查辦法?', a: { QR:5, CR:5, LI:2, ST:2, CP:1, GC:5, CO:2, SI:4, TC:1, GD:1, MT:2, MD:4 } },
    B: { type: 'group',      scenario: '【測試案例 B】校園突發系統當機,需立即決定備援程序。', a: { QR:1, CR:1, LI:5, ST:5, CP:5, GC:5, CO:1, SI:1, TC:5, GD:5, MT:5, MD:1 } },
    C: { type: 'individual', scenario: '【測試案例 C】是否將博士論文題目選擇權完全交給該位指導學生?', a: { QR:2, CR:5, LI:1, ST:1, CP:1, GC:5, CO:1, SI:5, TC:1, MT:2, MD:5 } }
  };
  const tc = cases[c];
  state.problemType = tc.type;
  state.scenario = tc.scenario;
  state.answers = { ...tc.a };
  computeAndShow();
}

      <thead><tr><th>個人</th><th>f₁</th><th>f₂</th><th>f₃</th><th>f₄</th><th>f₅</th><th>f₆</th></tr></thead>
      <tbody>
        ${Object.entries(PROCESSES_INDIV).map(([k, c]) =>
          `<tr><td>${k}</td><td>${c.f1}</td><td>${c.f2}</td><td>${c.f3}</td><td>${c.f4}</td><td>${c.f5}</td><td>${c.f6}</td></tr>`
        ).join('')}
      </tbody>
    </table>
  `;

  // 方程式
  const paneEqs = document.getElementById('pane-eqs');
  paneEqs.innerHTML = `
    <div class="eq-section-title">團體模型 · Group Model</div>
    <div class="eq-block">
      <span class="eq-name">D<span class="eq-sub">Qual</span></span>= QR − (QR/2) × [ <em>f</em>₂·LI + <em>f</em>₄·LI·ST + <em>f</em>₃·GC + (<em>f</em>₁·LI·(1+GC)·CO/2) + (<em>f</em>₃·SI/2) ]
    </div>
    <div class="eq-block">
      <span class="eq-name">D<span class="eq-sub">Comm</span></span>= CR − (CR/2) × [ <em>f</em>₁·CP − ((<em>f</em>₃+<em>f</em>₄+1)·CO·CP/2) ]
    </div>
    <div class="eq-block">
      <span class="eq-name">D<span class="eq-sub">TP</span></span>= (D<span class="eq-sub">Qual</span> + D<span class="eq-sub">Comm</span>) × (1+<em>f</em>₁) × TC
    </div>
    <div class="eq-block">
      <span class="eq-name">Cost</span>= (MT/6) × [ (1+<em>f</em>₁)(1−ST) − ((<em>f</em>₃+<em>f</em>₄−1)·CO/2) ] − 5(<em>f</em>₄−1)·GD
    </div>
    <div class="eq-block">
      <span class="eq-name">Devpt</span>= (MD/24) × QR × [ (1+<em>f</em>₁) − ((<em>f</em>₃+<em>f</em>₄−1)·(GC+0.5)·CO) ]
    </div>
    <div class="eq-block" style="background:var(--cream-warm);border-left-color:var(--navy)">
      <span class="eq-name">O<span class="eq-sub">Eff</span></span>= D<span class="eq-sub">Qual</span> + D<span class="eq-sub">Comm</span> − D<span class="eq-sub">TP</span> − Cost + Devpt
    </div>

    <div class="eq-section-title">個人模型 · Individual Model</div>
    <div class="eq-block">
      <span class="eq-name">D<span class="eq-sub">Qual</span></span>= QR − (QR/2) × [ <em>f</em>₂·LI + <em>f</em>₄·LI·ST + 2<em>f</em>₃·GC + 2<em>f</em>₃·SI + (<em>f</em>₆·LI·(1+GC)·CO/2) + (<em>f</em>₅·GC·(1+CR·CP/4)) ]
    </div>
    <div class="eq-block">
      <span class="eq-name">D<span class="eq-sub">Comm</span></span>= CR − CR × (<em>f</em>₁·CP)
    </div>
    <div class="eq-block">
      <span class="eq-name">D<span class="eq-sub">TP</span></span>= [ (D<span class="eq-sub">Qual</span>+D<span class="eq-sub">Comm</span>)·(1+<em>f</em>₆) + (<em>f</em>₃·QR·(SI+GC)) ] × TC
    </div>
    <div class="eq-block">
      <span class="eq-name">Cost</span>= (MT/6) × [ (1+<em>f</em>₆)(1−ST) − (<em>f</em>₅·CO) ]
    </div>
    <div class="eq-block">
      <span class="eq-name">Devpt</span>= (MD/24) × QR × [ (1+<em>f</em>₁) − 2<em>f</em>₅·(GC+0.5)·CO ]
    </div>
    <div class="eq-block" style="background:var(--cream-warm);border-left-color:var(--navy)">
      <span class="eq-name">O<span class="eq-sub">Eff</span></span>= D<span class="eq-sub">Qual</span> + D<span class="eq-sub">Comm</span> − D<span class="eq-sub">TP</span> − Cost + Devpt
    </div>
  `;
}

// Modal tabs
document.querySelectorAll('.modal-tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.modal-tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.modal-pane').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('pane-' + t.dataset.tab).classList.add('active');
  });
});

// ESC 關閉 modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

/* ============================================================
   7. 啟動
   ============================================================ */
render();

</script>
</body>
</html>
